<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love ❤️</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff5f7;
            overflow: hidden;
            margin: 0;
        }

        .cursive {
            font-family: 'Dancing Script', cursive;
        }

        .section {
            display: none;
            opacity: 0;
            width: 100%;
            max-width: 400px;
            text-align: center;
            z-index: 10;
        }

        .active-section {
            display: block;
        }

        .floating {
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .sticker-container {
            width: 250px;
            height: 250px;
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            background: white;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.6);
            border: 4px solid #fff;
            overflow: hidden;
        }

        .sticker-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div id="hearts-container" class="fixed inset-0 pointer-events-none z-0"></div>

    <div id="love-ask-page" class="section active-section" style="opacity: 1;">
        <h1 class="text-5xl font-bold text-pink-600 mb-10 cursive">Do you love me? 🥺</h1>
        <div class="flex justify-center gap-6">
            <button onclick="goToProposal()" class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 px-10 rounded-full shadow-lg transform hover:scale-110 transition duration-300">
                Yes! 🙈
            </button>
            <button onmouseover="moveButton(this)" class="bg-gray-400 text-white font-bold py-3 px-10 rounded-full shadow-md transition-all duration-100">
                No ❌
            </button>
        </div>
    </div>

    <div id="proposal-page" class="section">
        <h1 class="text-4xl font-bold text-pink-600 mb-6 cursive">Socho Achchee See.. 🙈💝</h1>
        <div class="sticker-container">
            <img src="cute.jpg" alt="Love Sticker" class="sticker-img" onerror="this.parentElement.innerHTML='<span class=\'text-8xl\'>❤️</span>'">
        </div>
        <div class="flex justify-center items-center gap-6 h-16 relative">
            <button onclick="goToThankYou()" class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 px-10 rounded-full shadow-lg transform hover:scale-110 transition duration-300">
                Yes 💖
            </button>
            <button onmouseover="moveButton(this)" class="bg-gray-400 text-white font-bold py-3 px-8 rounded-full shadow-md transition-all duration-100">
                No 😢
            </button>
        </div>
    </div>

    <div id="thank-you-page" class="section">
        <h2 class="text-4xl font-bold text-pink-600 mb-6 cursive floating">Thank you, Madam Jii!</h2>
        <div id="gift-area" class="cursor-pointer" onclick="openGift()">
            <div class="text-[100px] mb-2 transform hover:scale-110 transition duration-300">🎁</div>
            <p class="text-pink-400 font-bold italic animate-pulse">Tap the gift to open!</p>
        </div>
        <div id="date-area" class="mt-8 hidden opacity-0 scale-90">
            <div class="text-6xl mb-4">😘</div>
            <p class="text-2xl text-pink-600 mb-6 font-semibold">Let's go for a date! 💑</p>
            <div class="bg-white p-6 rounded-3xl shadow-2xl border-2 border-pink-100">
                <input id="date-input" type="date" class="w-full p-3 rounded-xl border-2 border-pink-200 focus:border-pink-500 outline-none text-pink-600 bg-pink-50 mb-4">
                <button onclick="sendWhatsApp()" class="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-4 rounded-xl shadow-lg transform hover:scale-105 transition duration-300">
                    Confirm & Send 💋
                </button>
            </div>
            <p id="success-msg" class="mt-6 text-pink-500 font-bold hidden"></p>
            <button id="plan-btn" onclick="window.location.href='plan.html'" class="hidden mt-4 mx-auto bg-gradient-to-r from-pink-400 to-rose-400 text-white font-bold py-3 px-8 rounded-full shadow-md">
                View Our Plan 🌟
            </button>
        </div>
    </div>

    <script>
        // Setup Date Input
        const dInput = document.getElementById('date-input');
        dInput.min = new Date().toISOString().split('T')[0];

        // Hearts Animation
        function createHeart() {
            const container = document.getElementById('hearts-container');
            const heart = document.createElement('div');
            heart.innerHTML = ['❤️', '🌹', '💖', '✨'][Math.floor(Math.random() * 4)];
            heart.className = 'absolute text-xl';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '-5vh';
            container.appendChild(heart);

            gsap.to(heart, {
                y: '110vh',
                x: (Math.random() - 0.5) * 200,
                rotation: Math.random() * 360,
                duration: 4 + Math.random() * 4,
                ease: "none",
                onComplete: () => heart.remove()
            });
        }
        setInterval(createHeart, 300);

        // Runaway Button Logic
        function moveButton(btn) {
            const x = Math.random() * (window.innerWidth - btn.offsetWidth - 20);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight - 20);
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        // Screen 1 -> Screen 2
        function goToProposal() {
            gsap.to("#love-ask-page", { opacity: 0, duration: 0.5, onComplete: () => {
                document.getElementById("love-ask-page").classList.remove("active-section");
                const prop = document.getElementById("proposal-page");
                prop.classList.add("active-section");
                gsap.to(prop, { opacity: 1, duration: 0.5 });
            }});
        }

        // Screen 2 -> Screen 3
        function goToThankYou() {
            gsap.to("#proposal-page", { opacity: 0, duration: 0.5, onComplete: () => {
                document.getElementById("proposal-page").classList.remove("active-section");
                const ty = document.getElementById("thank-you-page");
                ty.classList.add("active-section");
                gsap.to(ty, { opacity: 1, duration: 0.5 });
            }});
        }

        // Open Gift
        function openGift() {
            gsap.to("#gift-area", { scale: 0, opacity: 0, duration: 0.5, onComplete: () => {
                document.getElementById("gift-area").style.display = "none";
                const dateArea = document.getElementById("date-area");
                dateArea.classList.remove("hidden");
                gsap.to(dateArea, { opacity: 1, scale: 1, duration: 0.5 });
            }});
        }

        // WhatsApp Send
        function sendWhatsApp() {
            const val = document.getElementById('date-input').value;
            const phone = "916207359044"; 

            if (val) {
                const text = `Yes! I love you too ❤️ and I've picked ${val} for our date! 😘`;
                window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`, '_blank');
                
                document.getElementById('success-msg').innerText = `Message sent! Can't wait for ${val}! 💘`;
                document.getElementById('success-msg').classList.remove('hidden');
                document.getElementById('plan-btn').classList.remove('hidden');
            } else {
                alert('Pick a date first, Madam Jii! 🗓️');
            }
        }
    </script>
</body>
</html>
